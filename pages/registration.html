<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oripalot — 新規登録</title>
  <link rel="stylesheet" href="../assets/style.css"/>
  <style>
    /* Page-specific overrides */
    body { background: #F5F5F5; }

    .page-content { padding: 16px; background: #F5F5F5; }

    /* Banner placeholder */
    .banner-placeholder {
      width: 100%;
      height: 120px;
      background: repeating-conic-gradient(#ccc 0% 25%, #e8e8e8 0% 50%) 0 0 / 20px 20px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 0.75rem;
      color: #999;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Form card */
    .form-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 20px 16px;
      margin-bottom: 12px;
    }

    /* Input wrapper for icons */
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      background: #fff;
      border: 1px solid #CCCCCC;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      padding: 12px 40px 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-wrap input:focus { border-color: var(--red); }
    .input-wrap input.valid { border-color: var(--success); }
    .input-wrap input::placeholder { color: #bbb; }

    .input-wrap .icon-left {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: #999;
      pointer-events: none;
    }
    .input-wrap .icon-right {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      cursor: pointer;
      color: #999;
    }
    .input-wrap .icon-right.valid-check { color: var(--success); }
    .input-wrap input.has-left-icon { padding-left: 40px; }

    /* Label */
    .field-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      display: block;
    }
    .field-label .sub {
      display: block;
      font-size: 0.72rem;
      color: #999;
      font-weight: 400;
    }
    .required-star { color: var(--red); margin-left: 2px; }

    .form-field { margin-bottom: 14px; }

    /* Divider with text */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: #999;
      font-size: 0.78rem;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E0E0E0;
    }

    /* Social buttons */
    .btn-apple {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: var(--text);
      border: 1.5px solid #CCCCCC;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-google:hover { border-color: var(--red); }
    .btn-line-reg {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #06C755;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }

    /* Main CTA */
    .btn-register {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-register:disabled {
      background: #C9C9C9;
      cursor: not-allowed;
    }
    .btn-register:not(:disabled):hover { background: var(--red-dark); }

    /* Footer login link */
    .login-footer {
      text-align: center;
      font-size: 0.83rem;
      color: #666;
      padding: 12px 0 4px;
    }
    .login-footer a { color: var(--red); text-decoration: none; font-weight: 700; }

    /* ---- Modal overlays ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    /* Bottom-sheet style for exit popup */
    .modal-overlay.bottom-sheet {
      align-items: flex-end;
    }
    .modal-overlay.bottom-sheet .modal-box {
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%;
      max-width: 480px;
    }

    .modal-box {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 28px 20px 24px;
      width: calc(100% - 40px);
      max-width: 380px;
      text-align: center;
    }
    .modal-box .modal-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .modal-box h2 {
      font-size: 1.2rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--text);
    }
    .modal-box .modal-sub {
      font-size: 0.84rem;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .modal-coin-row {
      background: #F5F5F5;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.88rem;
    }
    .modal-coin-row .coin-val {
      font-weight: 700;
      font-size: 1rem;
    }
    .modal-btn-red {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .modal-btn-red:hover { background: var(--red-dark); }
    .modal-btn-gray {
      display: block;
      width: 100%;
      padding: 14px;
      background: #F0F0F0;
      color: #666;
      border: none;
      border-radius: 30px;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn-gray:hover { background: #E0E0E0; }

    /* Exit popup */
    .exit-box {
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 24px 20px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .exit-box h2 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .exit-box p { font-size: 0.83rem; color: #666; margin-bottom: 20px; }
    .exit-box .btn-row { display: flex; gap: 10px; }
    .exit-box .btn-row button { flex: 1; padding: 13px; border: none; border-radius: 30px; font-family: var(--font); font-size: 0.9rem; font-weight: 700; cursor: pointer; }
    .exit-box .btn-cancel { background: #F0F0F0; color: #666; }
    .exit-box .btn-exit { background: var(--red); color: #fff; }
  </style>
</head>
<body>

<div class="page" id="main-page">

  <!-- Header: auth (no coins) — injected via injectNav, but we do it inline for auth pages -->
  <header class="auth-header" style="position:sticky;top:0;z-index:100;">
    <a href="../index.html" class="logo">
      <div class="logo-icon">🎴</div>
      <span class="logo-text">オリパロット</span>
    </a>
    <div class="auth-header-btns">
      <a href="registration.html" class="btn-signup-sm">登録</a>
      <a href="registration.html" class="btn-login-sm">ログイン</a>
    </div>
  </header>

  <div class="page-content">

    <!-- Banner image placeholder -->
    <div class="banner-placeholder">BANNER IMAGE</div>

    <!-- Form card -->
    <div class="form-card">

      <!-- Email -->
      <div class="form-field">
        <label class="field-label">
          メールアドレス <span class="required-star">*</span>
          <span class="sub">Email Address *</span>
        </label>
        <div class="input-wrap">
          <input type="email" id="inp-email" placeholder="example@email.com" autocomplete="email" oninput="handleInput(this)"/>
          <span class="icon-right" id="check-email" style="display:none;">✅</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-field">
        <label class="field-label">
          パスワード（半角英数字8文字以上）<span class="required-star">*</span>
          <span class="sub">Password (At least 8 alphanumeric characters) *</span>
        </label>
        <div class="input-wrap">
          <input type="password" id="inp-password" placeholder="8文字以上の英数字" autocomplete="new-password" oninput="handleInput(this)"/>
          <span class="icon-right" id="eye-toggle" onclick="togglePassword()" title="パスワードを表示">👁</span>
        </div>
      </div>

      <!-- Date of Birth -->
      <div class="form-field">
        <label class="field-label">
          生年月日 <span class="required-star">*</span>
          <span class="sub">Date of Birth *</span>
        </label>
        <div class="input-wrap">
          <span class="icon-left" style="left:12px;font-size:0.9rem;">📅</span>
          <input type="date" id="inp-dob" class="has-left-icon" oninput="handleInput(this)"/>
          <span class="icon-right" id="check-dob" style="display:none;">✅</span>
        </div>
      </div>

      <!-- Invitation Code -->
      <div class="form-field">
        <label class="field-label">
          招待コード（任意）
          <span class="sub">Invitation Code (Optional)</span>
        </label>
        <div class="input-wrap">
          <input type="text" id="inp-invite" placeholder="招待コードをお持ちの場合は入力" oninput="handleInput(this)"/>
          <span class="icon-right" id="check-invite" style="display:none;">✅</span>
        </div>
      </div>

      <!-- Agree checkbox -->
      <div class="checkbox-row" style="margin-bottom:18px;">
        <input type="checkbox" id="agree-checkbox" onchange="toggleRegisterBtn()"/>
        <label for="agree-checkbox">
          会員登録により<a href="#">利用規約</a>及び<a href="#">プライバシーポリシー</a>に同意します<br/>
          <span style="color:#999;">By registering, you agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>
      </div>

      <!-- Main CTA -->
      <button class="btn-register" id="register-btn" disabled onclick="handleRegister()">
        無料で新規登録する<br/>
        <span style="font-size:0.75rem;font-weight:400;opacity:0.85;">Sign Up for Free</span>
      </button>

    </div><!-- /form-card -->

    <!-- Other methods divider -->
    <div class="or-divider">他の方法で登録する / Sign up with other methods</div>

    <!-- Social sign-up buttons -->
    <button class="btn-apple" onclick="showToast('Apple サインアップ — coming soon', 'info')">
      🍎 Appleでサインアップ
      <span style="font-size:0.75rem;font-weight:400;opacity:0.75;">Sign up with Apple</span>
    </button>

    <button class="btn-google" onclick="showToast('Google 登録 — coming soon', 'info')">
      <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleで登録
      <span style="font-size:0.75rem;font-weight:400;color:#999;">Sign up with Google</span>
    </button>

    <button class="btn-line-reg" onclick="showToast('LINE 登録 — coming soon', 'info')">
      💬 LINEで登録
      <span style="font-size:0.75rem;font-weight:400;opacity:0.85;">Sign up with LINE</span>
    </button>

    <!-- Footer -->
    <div class="login-footer">
      すでにアカウントをお持ちですか？<a href="#">ログイン</a><br/>
      <span style="color:#999;font-size:0.75rem;">Already have an account? <a href="#" style="color:var(--red);font-weight:700;">Log In</a></span>
    </div>

  </div><!-- /page-content -->

</div><!-- /page -->

<!-- Bottom nav injected by nav.js -->

<!-- ========== SUCCESS MODAL ========== -->
<div class="modal-overlay" id="modal-success">
  <div class="modal-box">
    <div class="modal-icon">🎉</div>
    <h2>登録完了！<br/><span style="font-size:0.85rem;font-weight:400;color:#666;">Registration Complete!</span></h2>
    <div class="modal-sub">
      アカウントが作成されました。<br/>
      ウェルカムボーナスをプレゼント！
    </div>
    <div class="modal-coin-row">
      <span>💎 フリーコイン</span>
      <span class="coin-val" style="color:#4A90D9;">+500</span>
    </div>
    <div class="modal-coin-row" style="margin-top:-10px;">
      <span>🟡 オリパコイン</span>
      <span class="coin-val" style="color:#F5A623;">+0</span>
    </div>
    <button class="modal-btn-red" onclick="window.location.href='../index.html'">
      ゲームを始める / Start Playing
    </button>
  </div>
</div>

<!-- ========== EXIT POPUP (bottom sheet) ========== -->
<div class="modal-overlay bottom-sheet" id="modal-exit" onclick="handleExitOverlayClick(event)">
  <div class="exit-box" id="exit-box">
    <h2>本当に登録をやめますか？</h2>
    <p>入力した内容は保存されません。<br/><span style="color:#999;">Are you sure you want to stop registering?</span></p>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeExitModal()">キャンセル<br/><span style="font-size:0.72rem;font-weight:400;">Cancel</span></button>
      <button class="btn-exit" onclick="window.location.href='../index.html'">終了<br/><span style="font-size:0.72rem;font-weight:400;">Exit</span></button>
    </div>
  </div>
</div>

<script src="../assets/nav.js"></script>
<script>
  // Inject bottom nav only (no top header since we have auth header inline)
  (function() {
    const navItems = [
      { id: 'oripa',  icon: '🎴', label: 'オリパ',   href: '../index.html' },
      { id: 'loot',   icon: '📦', label: 'MY LOOT',  href: 'prize-history.html' },
      { id: 'quest',  icon: '🎯', label: 'クエスト', href: '#' },
      { id: 'mypage', icon: '👤', label: 'マイページ', href: 'mypage.html' },
    ];
    const navHTML = navItems.map(item => `
      <a href="${item.href}" class="${item.id === 'oripa' ? 'active' : ''}">
        <span class="nav-icon">${item.icon}</span>
        <span>${item.label}</span>
      </a>`).join('');
    document.body.insertAdjacentHTML('beforeend',
      `<nav class="bottom-nav">${navHTML}</nav>`);
  })();

  // --- Input validation & green checkmark ---
  function handleInput(input) {
    const id = input.id;
    let valid = false;
    if (id === 'inp-email')    valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value);
    if (id === 'inp-password') valid = input.value.length >= 8;
    if (id === 'inp-dob')      valid = input.value !== '';
    if (id === 'inp-invite')   valid = input.value.length > 0;

    const checkMap = {
      'inp-email':    'check-email',
      'inp-password': null,
      'inp-dob':      'check-dob',
      'inp-invite':   'check-invite'
    };
    // For password field, check icon is the eye toggle — show valid class only
    if (id === 'inp-password') {
      input.classList.toggle('valid', valid);
      return;
    }
    const checkId = checkMap[id];
    if (checkId) {
      const icon = document.getElementById(checkId);
      if (icon) icon.style.display = valid ? 'inline' : 'none';
      input.classList.toggle('valid', valid);
    }
  }

  // --- Password eye toggle ---
  function togglePassword() {
    const inp = document.getElementById('inp-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // --- Checkbox toggles register button ---
  function toggleRegisterBtn() {
    const checked = document.getElementById('agree-checkbox').checked;
    const btn = document.getElementById('register-btn');
    btn.disabled = !checked;
  }

  // --- Register submit ---
  function handleRegister() {
    const email = document.getElementById('inp-email').value;
    const password = document.getElementById('inp-password').value;
    const dob = document.getElementById('inp-dob').value;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showToast('有効なメールアドレスを入力してください', 'danger'); return;
    }
    if (password.length < 8) {
      showToast('パスワードは8文字以上で入力してください', 'danger'); return;
    }
    if (!dob) {
      showToast('生年月日を入力してください', 'danger'); return;
    }
    // Show success modal
    document.getElementById('modal-success').classList.add('show');
  }

  // --- Exit popup: show when clicking outside form area ---
  document.addEventListener('click', function(e) {
    // Only trigger on specific "outside" interactions, not form elements
    if (e.target.id === 'main-page' || e.target.classList.contains('page-content')) {
      const emailFilled = document.getElementById('inp-email').value;
      const passFilled  = document.getElementById('inp-password').value;
      if (emailFilled || passFilled) {
        document.getElementById('modal-exit').classList.add('show');
      }
    }
  });

  function closeExitModal() {
    document.getElementById('modal-exit').classList.remove('show');
  }
  function handleExitOverlayClick(e) {
    if (e.target === document.getElementById('modal-exit')) {
      closeExitModal();
    }
  }
</script>
</body>
</html>
